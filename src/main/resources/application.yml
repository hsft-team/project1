spring:
  application:
    name: attendance-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/attendance_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-very-secret-key}
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:31536000}

logging:
  level:
    org.hibernate.SQL: debug

invite:
  base-url: ${INVITE_BASE_URL:https://m.hsft.io.kr}
  expiration-hours: ${INVITE_EXPIRATION_HOURS:72}

internal:
  api:
    key: ${INTERNAL_API_KEY:local-admin-web-key}

platform:
  policy:
    enabled: ${PLATFORM_POLICY_ENABLED:false}
    base-url: ${PLATFORM_POLICY_BASE_URL:http://localhost:8092}
    internal-api-key: ${PLATFORM_POLICY_INTERNAL_API_KEY:local-platform-key}
