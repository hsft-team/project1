spring:
  application:
    name: attendance-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/attendance_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-very-secret-key}
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:86400}

logging:
  level:
    org.hibernate.SQL: debug
