services:
  postgres:
    image: postgres:16
    container_name: attendance-postgres
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/attendance_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-me-change-me-change-me-change-me-very-secret-key
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
